# ─────────────────────────────────────────────────────────────────
#  GuildRoyale — config.yml
# ─────────────────────────────────────────────────────────────────

# Storage backend: JSON | SQLITE | MYSQL
storage:
  type: JSON

  # Used only when type is SQLITE
  sqlite:
    file: guildroyale.db

  # Used only when type is MYSQL
  mysql:
    host: localhost
    port: 3306
    database: guildroyale
    username: root
    password: password
    pool-size: 10

# ── Guild creation ───────────────────────────────────────────────
creation:
  # Economy cost (requires Vault). 0 = free
  money-cost: 500.0
  # Items consumed on creation. Leave empty list for no requirement.
  item-requirements: []

# ── Shortname change cost ────────────────────────────────────────
shortname-change-cost: 100.0

# ── XP / level progression ──────────────────────────────────────
xp:
  # XP required for level n = base * (multiplier ^ (n - 1))
  base: 1000
  multiplier: 1.5
  # Maximum guild level (1–10 supported by API)
  level-cap: 10

# ── Leaderboard ──────────────────────────────────────────────────
leaderboard:
  # How many guilds to show per page in the GUI
  page-size: 10
  # How often (in seconds) to refresh the cached leaderboard
  cache-refresh-seconds: 60

# ── Invite expiry ────────────────────────────────────────────────
invite:
  # Seconds until a pending invite expires
  expire-seconds: 120

# ── Default roles ────────────────────────────────────────────────
# Index 0 is always Leader (full permissions, cannot be deleted or customised here)
default-roles:
  - name: Co-Leader
    index: 1
    permissions:
      - MEMBER_MANAGEMENT
      - INVITE
      - KICK
      - GUILD_SETTINGS
      - ICON_CHANGE
  - name: Helper
    index: 2
    permissions:
      - INVITE
  - name: Member
    index: 3
    permissions: []
